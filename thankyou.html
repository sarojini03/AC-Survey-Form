<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root{
      --bg: #f6f8fa;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #5b6b78;
      --primary1: #3bb6e3;
      --primary2: #1976d2;
      --ring: rgba(25, 118, 210, 0.18);
    }
    * { box-sizing: border-box; }
    body{
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(1100px 400px at 15% 0%, rgba(59,182,227,0.20), transparent 60%),
        radial-gradient(900px 360px at 85% 15%, rgba(25,118,210,0.18), transparent 55%),
        var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card{
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0px 10px 40px rgba(0,0,0,0.10);
      padding: 42px 30px;
      position: relative;
      overflow: hidden;
    }
    .card::before{
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(87deg, rgba(59,182,227,0.25) 0%, rgba(25,118,210,0.25) 100%);
      filter: blur(18px);
      z-index: 0;
    }
    .content{
      position: relative;
      z-index: 1;
    }
    .header{
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
      margin-bottom: 14px;
    }
    .icon{
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #0b3d1e;
      background: rgba(46, 204, 113, 0.18);
      border: 1px solid rgba(46, 204, 113, 0.32);
      box-shadow: 0 8px 22px rgba(46,204,113,0.14);
    }
    h1{
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 0.2px;
      color: #154259;
    }
    p{
      margin: 10px 0 0 0;
      text-align: center;
      color: var(--muted);
      line-height: 1.55;
      font-size: 1.03rem;
    }
    .actions{
      margin-top: 26px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a.button{
      text-decoration: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid transparent;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
      user-select: none;
    }
    a.button.primary{
      color: #fff;
      background: linear-gradient(87deg, var(--primary1) 0%, var(--primary2) 100%);
      box-shadow: 0 10px 24px rgba(25,118,210,0.18);
    }
    a.button.primary:hover{
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(25,118,210,0.22);
    }
    a.button.secondary{
      color: #154259;
      background: #f5f9fb;
      border-color: rgba(56,150,226,0.18);
    }
    a.button.secondary:hover{
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.08);
    }
    .divider{
      margin: 28px auto 0 auto;
      height: 1px;
      width: min(520px, 95%);
      background: linear-gradient(90deg, transparent, rgba(25,118,210,0.20), transparent);
    }
    .note{
      margin-top: 16px;
      font-size: 0.95rem;
      color: rgba(91,107,120,0.95);
    }
    .note strong{
      color: #195776;
    }
    @media (max-width: 500px) {
      .card { padding: 30px 18px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <main class="card" role="main" aria-label="Submission success">
    <div class="content">
      <div class="header">
        <div class="icon" aria-hidden="true">
          <i class="fa-solid fa-circle-check" style="font-size: 1.55rem;"></i>
        </div>
        <h1>Thank you for your response</h1>
      </div>

      <p>Your submission has been recorded successfully.</p>
      <p class="note"><strong>Tip:</strong> You may now close this tab safely.</p>

      <div class="actions">
        <a class="button primary" href="index.html">
          <i class="fa-solid fa-arrow-left"></i>
          Back to survey
        </a>
        <a class="button secondary" href="index.html" onclick="try{window.location.replace('index.html');}catch(e){}">
          <i class="fa-solid fa-rotate-left"></i>
          Fill again
        </a>
      </div>

      <div class="divider" aria-hidden="true"></div>
    </div>
  </main>
</body>
</html>
